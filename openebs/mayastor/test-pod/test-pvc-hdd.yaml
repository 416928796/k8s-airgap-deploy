# HDD 存储池测试 PVC
# 使用 mayastor-hdd-triple-replica StorageClass
# 3 副本冗余，数据分布在 3 个节点的 HDD DiskPool 上

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mayastor-hdd-test-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: mayastor-hdd-triple-replica
  resources:
    requests:
      storage: 10Gi
