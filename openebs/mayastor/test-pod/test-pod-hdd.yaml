# HDD 存储池测试 Pod
# 用于验证 HDD StorageClass 是否正常工作

apiVersion: v1
kind: Pod
metadata:
  name: mayastor-hdd-test-pod
  namespace: default
spec:
  containers:
    - name: test
      image: 172.25.128.67:9003/library/busybox:latest
      command: ["/bin/sh", "-c", "sleep infinity"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: mayastor-hdd-test-pvc
